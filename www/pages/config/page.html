<div class="page-center" style="max-width: 1100px;">

  </div>

    </div>
    <div class="cm-right">
      <input class="input" id="kw" placeholder="请输入关键词" style="min-width: 220px;" />

        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h16v2H4v-2z"/></svg>
      </button>
      <button class="cm-icon" id="gridBtn" title="布局">

      </button>
      <button class="cm-icon" id="searchBtn" title="搜索">

      </button>
    </div>
  </div>

  <div class="table-wrap square">
    <table>
      <thead>
        <tr>
          <th style="width: 44px;"><input type="checkbox" id="checkAll" /></th>
          <th style="width: 70px;">序号</th>
          <th>名称</th>
          <th style="width: 140px;">类型</th>
          <th style="width: 120px;">金额</th>
          <th style="width: 170px;">创建时间</th>
          <th style="width: 100px;">操作</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="7" class="empty">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="cm-footer">
    <div class="cm-footer-left" id="summary">显示第 0 到 0 条记录，总共 0 条记录</div>
    <div class="cm-footer-right">
      <button class="btn-primary" id="prevBtn">上一页</button>
      <div class="cm-page">
        <span id="pageNo">1</span>
        <span class="page-muted">/</span>
        <span id="pageTotal">1</span>
      </div>
      <button class="btn-primary" id="nextBtn">下一页</button>
      <div class="cm-jump">
        <input class="input" id="jumpInput" placeholder="页码" style="width: 80px;" />
        <button class="btn-solid" id="jumpBtn">跳转</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="cmModal">
  <div class="modal-card" style="width: min(560px, calc(100vw - 32px));">
    <div class="modal-head">
      <div>新增消耗记录</div>
      <button class="btn-icon" id="cmModalClose" style="background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.18); color:#fff;">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex; flex-direction:column; gap:10px;">
        <input class="input" id="cmName" placeholder="名称（如：AI测试）" />
        <select class="select" id="cmType">
          <option value="ai_generate">系统生成</option>
          <option value="publish">发布</option>
          <option value="save">保存</option>
          <option value="ui">界面点击</option>
        </select>
        <input class="input" id="cmAmount" type="number" step="0.01" placeholder="金额（元）" />
        <input class="select" id="cmTime" type="datetime-local" />
      </div>
      <div class="page-muted" style="margin-top:10px;">保存后会立即在表格中展示（占位：后续可接入后端入库）。</div>
    </div>
    <div class="modal-actions">
      <button class="btn-solid" id="cmConfirm">确定</button>
      <button class="btn-primary" id="cmCancel">取消</button>
    </div>
  </div>
</div>
