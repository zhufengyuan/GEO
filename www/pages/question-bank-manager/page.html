<div class="card">
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn-primary" id="addBtn">+添加</button>
    </div>
    <div class="toolbar-right">
      <select class="select" id="scopeSelect">
        <option value="all">全部</option>
        <option value="认知触发">认知触发</option>
        <option value="对比筛选">对比筛选</option>
        <option value="锁定意向">锁定意向</option>
        <option value="求证决策">求证决策</option>
      </select>
      <input class="input" id="keywordInput" placeholder="输入关键词" />
      <button class="btn-icon" id="searchBtn" title="搜索">🔍</button>
      <button class="btn-solid" id="bulkDeleteBtn">删除</button>
      <button class="btn-primary" id="exportBtn">导出表格</button>
    </div>
  </div>

  <div class="table-wrap" style="overflow:auto;">
    <table class="qb-mgr-table">
      <thead>
        <tr>
          <th style="width: 60px; text-align:center;">
            <input type="checkbox" id="selectAll" />
          </th>
          <th style="width: 70px;">序号</th>
          <th style="width: 160px;">关键词</th>
          <th style="width: 160px;">拓展词</th>
          <th style="width: 140px;">决策阶段</th>
          <th>问题关键词</th>
          <th style="width: 140px;">创建时间</th>
          <th style="width: 120px;">状态</th>
          <th style="width: 90px;">去创作</th>
          <th style="width: 90px;">编辑</th>
          <th style="width: 90px;">删除</th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>
  </div>
</div>

<style>
.qb-mgr-table {
  min-width: 1280px;
}

.qb-mgr-table th {
  white-space: nowrap;
}
</style>

<div class="modal" id="qbMgrModal">
  <div class="modal-card" style="width: min(520px, calc(100vw - 32px));">
    <div class="modal-head">
      <div id="qbMgrModalTitle">添加关键词</div>
      <button class="op" id="qbMgrModalClose" style="color:#fff;">关闭</button>
    </div>
    <div class="modal-body">
      <div class="kb-form">
        <div class="kb-form-row">
          <div class="kb-label">企业名称/简称</div>
          <input class="input" id="qbMgrCompany" placeholder="可选" />
        </div>
        <div class="kb-form-row">
          <div class="kb-label"><span class="req">*</span>关键词</div>
          <input class="input" id="qbMgrKeyword" placeholder="请输入关键词" />
        </div>
        <div class="kb-form-row">
          <div class="kb-label">问题关键词</div>
          <input class="input" id="qbMgrQuestionKeyword" placeholder="默认同关键词" />
        </div>
        <div class="kb-form-row">
          <div class="kb-label">决策阶段</div>
          <select class="select" id="qbMgrStage">
            <option value="认知触发">认知触发</option>
            <option value="对比筛选">对比筛选</option>
            <option value="锁定意向">锁定意向</option>
            <option value="求证决策">求证决策</option>
          </select>
        </div>
        <div class="kb-form-row">
          <div class="kb-label">拓展词</div>
          <input class="input" id="qbMgrExpandWords" placeholder="留空则自动生成" />
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="qbMgrModalSave">保存</button>
      <button class="btn-solid" id="qbMgrModalCancel">取消</button>
    </div>
  </div>
</div>
